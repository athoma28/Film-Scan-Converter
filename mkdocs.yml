site_name: Film-Scan-Converter
site_url: https://github.com/kaimonmok/Film-Scan-Converter/fork
theme:
  name: material
  features:
    - navigation.instant
exclude:
  - images/


nav:
  - Home: index.md
  - Features: features.md
  - Installation: installation.md
  - How to Use: how-to-use.md
  - Best Practices: best-practices.md
  - Developer Guide:
      - Overview: development/index.md
      - Native macOS Status: development/native-macos.md
      - Native macOS Release: development/native-release.md
      - Real-Time Still Preview Plan: development/realtime-preview-plan.md
      - Native RAW Benchmark: development/native-raw-benchmark.md
      - Native macOS Technical Roadmap: improvements/MacOS-Native-Roadmap.md
      - Film Processing Research: film-processing-research.md
      - Building: development/building.md
      - Contributing: contributing.md
  - Legacy Python:
      - Status and Retirement Gates: legacy-python.md
      - ART Integration: how-to-add-to-ART.md


markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
