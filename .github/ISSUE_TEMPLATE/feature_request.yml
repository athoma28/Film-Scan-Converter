name: Feature request
description: Suggest an improvement to the photographer workflow
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Workflow problem
      description: What are you trying to accomplish, and what is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Suggested behavior
      description: Describe the outcome you would like; implementation ideas are optional.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Current workaround
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for this request.
          required: true
