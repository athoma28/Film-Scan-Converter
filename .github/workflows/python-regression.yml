name: Legacy Python Regression

on:
  push:
    paths:
      - ".github/workflows/python-regression.yml"
      - "source/**"
      - "tests/**"
  pull_request:
    paths:
      - ".github/workflows/python-regression.yml"
      - "source/**"
      - "tests/**"

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: source/requirements.txt
      - name: Install Python dependencies
        run: python -m pip install -r source/requirements.txt
      - name: Run Python regression suite
        run: python -m unittest discover -v
